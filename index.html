<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floreria Silvia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fff0f4;
      color: #3a101e;
      text-align: center;
      padding: 20px;
    }
    code {
      background: #ffffff;
      border: 1px solid #fad4df;
      padding: 2px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Floreria Silvia migrada a frontend + backend</h1>
    <p>Ejecuta <code>npm install</code> y luego <code>npm start</code>.</p>
    <p>Abre <code>http://localhost:3000</code>.</p>
  </main>
</body>
</html>
